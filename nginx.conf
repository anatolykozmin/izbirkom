# ──────────────────────────────────────────────
#  febnik.ru — Аркадиум (SPA :80 + FastAPI :8000 под /api)
# ──────────────────────────────────────────────

server {
    listen 443 ssl;
    http2 on;
    server_name febnik.ru www.febnik.ru;

    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/nginx/certs/arkadium/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/arkadium/privkey.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 50M;

    access_log /var/log/nginx/febnik.access.log;
    error_log  /var/log/nginx/febnik.error.log;

    # Ровно /api (без слэша) — POST /api и корень OpenAPI; иначе попадёт в SPA.
    # ВАЖНО: proxy_pass БЕЗ /api/ после порта и с $request_uri (см. README Аркадиума).
    location = /api {
        set $ark_back arkadium-site1-backend;
        proxy_pass         http://$ark_back:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    location /api/ {
        set $ark_back arkadium-site1-backend;
        proxy_pass         http://$ark_back:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # Статика, /telegram-web-app.js, SPA.
    location / {
        set $ark_front arkadium-site1-frontend;
        proxy_pass         http://$ark_front:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}

