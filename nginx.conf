server {
    listen 80;
    server_name febnik.ru www.febnik.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name rezonans26.ru www.rezonans26.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name veterperemenurfac.ru www.veterperemenurfac.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name koordinatorstvo2026.ru www.koordinatorstvo2026.ru;
    return 301 https://$host$request_uri;
