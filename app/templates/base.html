<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Голосование — студенческий совет{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>Студенческий совет</h1>
      <p class="tagline">Электронное голосование</p>
    </header>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
    <footer class="footer">
      <span>Один голос на один подтверждённый адрес электронной почты.</span>
    </footer>
  </div>
</body>
</html>
